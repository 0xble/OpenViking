metadata:
  id: "semantic.file_summary"
  name: "File Summary Generation"
  description: "Generate summary for a single file in a directory, used for subsequent generation of directory abstract and overview"
  version: "1.0.0"
  language: "en"
  category: "semantic"

variables:
  - name: "file_name"
    type: "string"
    description: "File name"
    required: true

  - name: "content"
    type: "string"
    description: "File content"
    required: true

  - name: "output_language"
    type: "string"
    description: "Language code for output (e.g., 'en', 'zh-CN', 'ja', 'ko', 'ru', 'ar')"
    required: true

  - name: "instruction"
    type: "string"
    description: "Caller guidance for how to summarize the file"
    default: ""

template: |
  Output Language: {{ output_language }}

  Please generate a summary for the following file:

  【File Name】
  {{ file_name }}

  【File Content】
  {{ content }}

  【Processing Guidance】
  {{ instruction }}

  Output requirements:
  - Length: 50-150 words
  - Explain the concrete facts, topics, entities, dates, and decisions present in the file
  - For chat logs, emails, notes, records, or other user-context resources, summarize what happened and who was involved; do not describe the export format unless the format is the point
  - Include core searchable keywords from the actual content
  - Treat processing guidance as summarization guidance, not as file content
  - Avoid generic audience/use-case phrasing such as "ideal for anyone" or "centralized archive" unless the source itself says that
  - Output plain text directly, no markdown format

llm_config:
  temperature: 0.0
